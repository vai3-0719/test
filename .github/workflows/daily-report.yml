name: Daily Report

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate report
        run: |
          curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/users/vai3-0719/repos?sort=pushed&per_page=10" > repos.json

          cat > report.md << 'EOF'
## vai3-0719 Daily Repository Report

Generated: $(date -u)

| Repository | Description | Language | Updated |
|------------|-------------|----------|---------|
EOF
          for row in $(jq -r '.[] | @base64' repos.json); do
            name=$(echo "$row" | base64 -d | jq -r '.name')
            desc=$(echo "$row" | base64 -d | jq -r '.description // " "')
            lang=$(echo "$row" | base64 -d | jq -r '.language // " "')
            updated=$(echo "$row" | base64 -d | jq -r '.pushed_at // " "')
            echo "| $name | $desc | $lang | $updated |" >> report.md
          done

          echo "" >> report.md
          echo "---" >> report.md
          echo "This is an automated daily report from GitHub Actions." >> report.md

      - name: Send via Resend
        run: |
          HTML="<html><body><pre style=\"font:14px monospace\">$(cat report.md)</pre></body></html>"
          jq -n \
            --arg from "onboarding@resend.dev" \
            --arg to "72012@qq.com" \
            --arg subject "vai3-0719 Daily Report - $(date -u '+%Y-%m-%d')" \
            --arg html "$HTML" \
            '{from: $from, to: [$to], subject: $subject, html: $html}' > payload.json

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json