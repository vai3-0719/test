name: Daily Report

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate report
        id: gen_report
        run: |
          curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/users/vai3-0719/repos?sort=pushed&per_page=10" > repos.json

          echo "## vai3-0719 Daily Repository Report" > report.md
          echo "" >> report.md
          echo "Generated: $(date -u)" >> report.md
          echo "" >> report.md
          echo "| Repository | Description | Language | Updated |" >> report.md
          echo "|------------|-------------|----------|---------|" >> report.md

          for row in $(jq -r '.[] | @base64' repos.json); do
            name=$(echo "$row" | base64 -d | jq -r '.name')
            desc=$(echo "$row" | base64 -d | jq -r '.description // " "')
            lang=$(echo "$row" | base64 -d | jq -r '.language // " "')
            updated=$(echo "$row" | base64 -d | jq -r '.pushed_at // " "')
            echo "| $name | $desc | $lang | $updated |" >> report.md
          done

          echo "" >> report.md
          echo "---" >> report.md
          echo "This is an automated daily report from GitHub Actions." >> report.md

          # Build HTML version
          cat report.md | sed 's/$/<br>/' > report.html
          echo "<html><body>" > report.html
          cat report.md | while IFS= read -r line; do
            echo "$line<br>" >> report.html
          done
          echo "</body></html>" >> report.html

          echo "REPORT=$(cat report.md)" >> $GITHUB_ENV

      - name: Send via Resend
        run: |
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "onboarding@resend.dev",
              "to": ["72012@qq.com"],
              "subject": "vai3-0719 Daily Report - '"$(date -u '+%Y-%m-%d')"'",
              "html": "<pre style=\"font-family:monospace\">'"$(cat report.md | sed 's/"/\\"/g' | tr '\n' '|' | sed 's/|/\\n/g')"'</pre>"
            }'