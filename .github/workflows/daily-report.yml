name: Daily Report
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send notification
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "onboarding@resend.dev",
              "to": ["bossai@qq.com"],
              "subject": "vai3-0719 Daily Report - '"$(date -u '+%Y-%m-%d')"'",
              "html": "<h3>vai3-0719 Daily Report</h3><p>6 repositories active with daily Actions</p><p>Auto-generated by GitHub Actions</p>"
            }'