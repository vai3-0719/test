name: Daily Report

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get repo count
        run: |
          curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/users/vai3-0719/repos?per_page=1" > /dev/null
          echo "count=$(curl -s -I -H 'Accept: application/vnd.github.v3+json' \
            'https://api.github.com/users/vai3-0719/repos?per_page=1' \
            | grep -i 'link:' | grep -oP 'page=\K\d+' | tail -1 || echo 6)" >> $GITHUB_ENV

      - name: Send notification
        run: |
          cat > payload.json << 'ENDJSON'
          {
            "from": "onboarding@resend.dev",
            "to": ["bossai@qq.com"],
            "subject": "vai3-0719 Daily Report",
            "html": "<h3>vai3-0719 Daily Report</h3><p>Repositories count: '"${{ env.count }}"'</p><p>Auto-generated by GitHub Actions</p>"
          }
ENDJSON
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json