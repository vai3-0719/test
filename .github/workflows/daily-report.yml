name: Daily Report

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate report
        run: |
          curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/users/vai3-0719/repos?sort=pushed&per_page=10" > repos.json
          
          cat > report.md << 'EOF'
## vai3-0719 Daily Repository Report

Generated: $(date -u)

| Repository | Description | Language | Updated |
|------------|-------------|----------|---------|
EOF
          for row in $(jq -r '.[] | @base64' repos.json); do
            name=$(echo "$row" | base64 -d | jq -r '.name')
            desc=$(echo "$row" | base64 -d | jq -r '.description // " "')
            lang=$(echo "$row" | base64 -d | jq -r '.language // " "')
            updated=$(echo "$row" | base64 -d | jq -r '.pushed_at // " "')
            echo "| $name | $desc | $lang | $updated |" >> report.md
          done
          
          echo "" >> report.md
          echo "---" >> report.md
          echo "This is an automated daily report from GitHub Actions." >> report.md
          
          cat report.md

      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: vai3-0719 Daily Report - $(date -u '+%Y-%m-%d')
          to: 72012@qq.com
          from: ${{ secrets.MAIL_FROM }}
          html_body: file://report.md
          ignore_cert: true
          convert_markdown: true